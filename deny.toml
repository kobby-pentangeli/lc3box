# cargo-deny configuration. Run locally with `cargo deny check`.
# CI (.github/workflows/security.yml) runs the full `cargo deny check`:
# advisories, bans, licenses, and sources.

[advisories]
version = 2
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
]
